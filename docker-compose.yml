version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: bus-reservation-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - bus-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bus-reservation-api
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/bus_reservation?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - bus-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bus-reservation-web
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - bus-network

volumes:
  mongodb_data:

networks:
  bus-network:
    driver: bridge
